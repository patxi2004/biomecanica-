name: biped_controller
description: Aplicación de control para robot bípedo 8-DOF vía BLE
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE - Comunicación con el ESP32
  flutter_blue_plus: ^1.31.0

  # Estado reactivo
  provider: ^6.1.1

  # Íconos extra (joystick visual)
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
