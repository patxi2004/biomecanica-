; ============================================================
;  platformio.ini  —  Proyecto Robot Bípedo ESP32
; ============================================================

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ─── Velocidad de carga ────────────────────────────────────
upload_speed = 921600
monitor_speed = 115200

; ─── Librerías ─────────────────────────────────────────────
;  - ESP32 BLE Arduino (incluida en la plataforma ESP32)
;  - Wire (incluida en Arduino)
;  - No se necesitan librerías externas: el MPU-6050 se lee
;    directamente por I²C sin librería extra.
lib_deps =

; ─── Opciones de compilación ───────────────────────────────
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_BT_ENABLED
    -DCONFIG_GATTS_ENABLE

; ─── Partición: habilita BLE (requiere más flash) ──────────
board_build.partitions = min_spiffs.csv
